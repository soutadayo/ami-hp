backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: /images

locale: ja

collections:
  - name: settings
    label: サイト設定
    files:

      - name: content
        label: コンテンツ管理
        file: content.json
        format: json
        fields:

          - label: LINE URL（全ページ共通）
            name: line_url
            widget: string
            hint: "無料カウンセリングのLINEリンク。ここを変えると全ボタンに反映されます"

          - label: X（Twitter）URL
            name: x_url
            widget: string

          - label: Note URL
            name: note_url
            widget: string

          - label: YouTube 動画ID①
            name: youtube_id_1
            widget: string
            required: false
            hint: "YouTubeのURLからIDを入力 例: dQw4w9WgXcQ"

          - label: YouTube 動画ID②
            name: youtube_id_2
            widget: string
            required: false

          - label: ヒーローセクション
            name: hero
            widget: object
            fields:
              - label: キャッチコピー（前半）
                name: copy_main
                widget: string
                hint: "例: 触れずに、"
              - label: キャッチコピー（後半・斜体）
                name: copy_em
                widget: string
                hint: "例: 変える。"
              - label: 説明文1行目
                name: desc_line1
                widget: string
              - label: 説明文2行目
                name: desc_line2
                widget: string
              - label: CTAボタン文言
                name: cta_text
                widget: string

          - label: 実績数字（4つ）
            name: numbers
            widget: list
            fields:
              - { label: 数値, name: val, widget: string }
              - { label: 単位, name: unit, widget: string }
              - { label: ラベル1行目, name: label_line1, widget: string }
              - { label: ラベル2行目, name: label_line2, widget: string }

          - label: Aboutセクション
            name: about
            widget: object
            fields:
              - label: タイトル（前半）
                name: title_main
                widget: string
              - label: タイトル（後半・斜体）
                name: title_em
                widget: string
              - label: 本文
                name: body
                widget: text
                hint: "改行は\\nで表現されます"

          - label: 生徒実績（3ケース）
            name: cases
            widget: list
            fields:
              - { label: "Before 上段テキスト", name: before_stat_main, widget: string }
              - { label: "Before 下段テキスト（斜体）", name: before_stat_em, widget: string }
              - label: Before タグ
                name: before_tags
                widget: list
                field: { label: タグ, name: tag, widget: string }
              - { label: "After 上段テキスト", name: after_stat_main, widget: string }
              - { label: "After 下段テキスト（斜体）", name: after_stat_em, widget: string }
              - label: After タグ
                name: after_tags
                widget: list
                field: { label: タグ, name: tag, widget: string }
              - { label: Before 画像, name: before_img, widget: image }
              - { label: After 画像, name: after_img, widget: image }

          - label: サービス（4項目）
            name: services
            widget: list
            fields:
              - { label: タイトル, name: title, widget: string }
              - { label: 説明文, name: desc, widget: text }

          - label: 無料コンテンツ（3項目）
            name: free_content
            widget: list
            fields:
              - { label: タイトル, name: title, widget: string }
              - { label: 説明文, name: desc, widget: text }
